<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 알림장 – DLAB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      padding: 40px 20px;
      color: #1a1a2e;
    }

    .site-logo {
      display: block;
      margin: 0 auto 8px;
      width: 120px;
      mix-blend-mode: multiply;
    }

    .week-info {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }
    .week-info strong { color: #7353EA; }

    .class-section {
      max-width: 480px;
      margin: 0 auto 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .class-header {
      background: #7353EA;
      color: #fff;
      padding: 16px 20px;
    }

    .class-header-main {
      font-size: 1rem;
      font-weight: 700;
    }

.student-list {
      padding: 10px 14px;
    }

    .student-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .student-card:hover { background: #f0f3ff; }

    .student-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: #1a1a2e;
    }

    .student-arrow {
      font-size: 1.1rem;
      color: #7353EA;
    }
  </style>
</head>
<body>

  <img src="../dlab.png" alt="D.LAB Code Academy" class="site-logo" />
  <p class="week-info" id="weekInfo">로딩 중...</p>

  <div class="class-section">
    <div class="class-header">
      <div class="class-header-main">[봄/토] 1100 / 파이썬트랙</div>
    </div>
    <div class="student-list">
      <a class="student-card" href="detail.html?id=나건후">
        <span class="student-name">나건후</span>
        <span class="student-arrow">›</span>
      </a>
    </div>
  </div>

  <div class="class-section">
    <div class="class-header">
      <div class="class-header-main">[봄/토] 1400 / 파이썬트랙</div>
    </div>
    <div class="student-list">
      <a class="student-card" href="detail.html?id=박노아">
        <span class="student-name">박노아</span>
        <span class="student-arrow">›</span>
      </a>
    </div>
  </div>

  <script>
    const SEMESTER_START = new Date('2026-02-23T00:00:00');
    const TOTAL_WEEKS = 12;

    function getCurrentWeek() {
      const diff = new Date() - SEMESTER_START;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days < 0) return 0;
      return Math.min(Math.floor(days / 7) + 1, TOTAL_WEEKS);
    }

    function getWeekRange(weekNum) {
      const start = new Date(SEMESTER_START);
      start.setDate(start.getDate() + (weekNum - 1) * 7);
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
      return `${fmt(start)} – ${fmt(end)}`;
    }

    const currentWeek = getCurrentWeek();
    document.getElementById('weekInfo').innerHTML =
      `현재 <strong>${currentWeek}주차</strong> 진행 중 (${getWeekRange(currentWeek)})`;
  </script>
</body>
</html>
