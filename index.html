<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLAB MGT 수업</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Montserrat:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN.md (Geniestudio) 토큰 ── */
    :root {
      --obsidian:#0a0d12; --silver-pine:#535862; --ash-gray:#93979f;
      --canvas-white:#ffffff; --arctic-mist:#fafdff; --sky-wash:#ebf5ff;
      --ghostly-blue:#cce7ff; --midnight-ink:#181d27;
      --luminous-blue:#0099ff; --electric-blue:#0069e0;
      --mint-glaze:#d3f6e3; --zesty-orange:#f26110;
      --font-body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
      --font-display:'Montserrat',ui-sans-serif,system-ui,sans-serif;
      --shadow-lg:rgba(4,69,144,0.08) 0px 14px 20px 4px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:var(--font-body); background:var(--sky-wash);
      color:var(--obsidian); min-height:100vh; padding:32px 16px 48px;
      letter-spacing:-0.01em; -webkit-font-smoothing:antialiased;
    }
    .wrap { max-width:520px; margin:0 auto; }
    .logo { display:block; margin:0 auto 8px; width:96px; mix-blend-mode:multiply; }
    .subtitle { text-align:center; color:var(--silver-pine); font-size:14px; margin-bottom:24px; }
    .subtitle strong { color:var(--electric-blue); }

    .card {
      background:var(--arctic-mist); border-radius:32px; padding:32px 24px;
      box-shadow:var(--shadow-lg);
    }
    h1 { font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:-0.02em; margin-bottom:6px; }
    .hint { color:var(--silver-pine); font-size:14px; margin-bottom:20px; line-height:1.5; }

    /* 이름 선택 칩 */
    .names { display:flex; flex-wrap:wrap; gap:10px; }
    .name-chip {
      font-family:var(--font-body); font-weight:600; font-size:15px;
      padding:12px 22px; border-radius:90px; border:1.5px solid var(--ash-gray);
      background:var(--canvas-white); color:var(--obsidian); cursor:pointer;
      transition:border-color .15s, background .15s, color .15s, transform .1s;
    }
    .name-chip:hover { border-color:var(--electric-blue); }
    .name-chip:active { transform:scale(.97); }

    /* PIN */
    .pin-row { display:flex; gap:12px; justify-content:center; margin:8px 0 4px; }
    .pin-box {
      width:56px; height:64px; text-align:center; font-family:var(--font-display);
      font-size:26px; font-weight:600; color:var(--obsidian); border-radius:16px;
      border:1.5px solid #e4e7ec; background:var(--canvas-white); -webkit-text-security:disc; text-security:disc;
    }
    .pin-box:focus { outline:none; border-color:var(--luminous-blue); }
    .pin-box.shake { animation:shake .3s; border-color:var(--zesty-orange); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    .banner { padding:14px 18px; border-radius:16px; font-size:14px; margin-bottom:16px; line-height:1.5; }
    .banner.error { background:#fff2eb; color:var(--zesty-orange); }
    .link-btn {
      background:none; border:none; color:var(--luminous-blue); font-family:var(--font-body);
      font-weight:600; font-size:15px; cursor:pointer; text-decoration:underline;
    }
    .btn-ghost {
      font-family:var(--font-body); font-weight:600; font-size:15px;
      padding:12px 20px; border-radius:32px; border:1.5px solid #e4e7ec;
      background:var(--canvas-white); color:var(--obsidian); cursor:pointer; transition:border-color .15s;
    }
    .btn-ghost:hover { border-color:var(--electric-blue); }

    /* 주차 그리드 */
    .weeks-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:6px; }
    .weeks-head h1 { margin:0; }
    .now-info { color:var(--silver-pine); font-size:14px; margin-bottom:20px; line-height:1.5; }
    .now-info strong { color:var(--electric-blue); }
    .week-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
    @media (max-width:380px) { .week-grid { grid-template-columns:repeat(2, 1fr); } }
    .week-cell {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      border-radius:16px; padding:16px 8px; text-align:center; text-decoration:none;
      font-family:var(--font-body); border:1.5px solid #e4e7ec; background:var(--canvas-white);
      color:var(--ash-gray);
    }
    .week-cell .wk-num { font-weight:600; font-size:15px; }
    .week-cell .wk-date { font-size:12px; }
    /* 현재 주차 (열림·클릭 가능) */
    .week-cell.current {
      background:var(--midnight-ink); color:var(--canvas-white); border-color:var(--midnight-ink);
      cursor:pointer; transition:transform .1s;
    }
    .week-cell.current .wk-date { color:#aab1c2; }
    .week-cell.current:hover { transform:translateY(-2px); }
    /* 잠긴 주차 (지난·예정) */
    .week-cell.locked { background:var(--sky-wash); border-style:dashed; border-color:#c5cef8; cursor:default; }
    .week-cell.locked .wk-num::after { content:" 🔒"; font-size:11px; }

    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="dlab.png" alt="D.LAB Code Academy" class="logo" />
    <p class="subtitle"><strong>MGT LAB</strong> · 핀 선생님</p>

    <!-- STEP 1: 이름 선택 -->
    <section class="card" id="stepName">
      <h1>이름을 선택하세요</h1>
      <p class="hint">로그인 후 이번 주차 문제로 들어갈 수 있어요.</p>
      <div class="names" id="nameList"></div>
    </section>

    <!-- STEP 2: PIN -->
    <section class="card hidden" id="stepPin">
      <h1>비밀번호 입력</h1>
      <p class="hint"><strong id="pinName"></strong> 님, 4자리 비밀번호를 입력하세요.</p>
      <div class="pin-row" id="pinRow"></div>
      <div id="pinBanner"></div>
      <button class="btn-ghost" id="pinBack">← 이름 다시</button>
    </section>

    <!-- STEP 3: 주차 그리드 -->
    <section class="card hidden" id="stepWeeks">
      <div class="weeks-head">
        <h1>주차 선택</h1>
        <button class="link-btn" id="logout">이름 바꾸기</button>
      </div>
      <p class="now-info" id="nowInfo"></p>
      <div class="week-grid" id="weekGrid"></div>
    </section>
  </div>

  <script>
    // ── 설정 ──────────────────────────────────────────
    const STUDENTS = ['박노아', '김세임', '정재윤', '한아라'];
    // 주차별 토요일 날짜 (8/1은 휴강 → 스킵). 인덱스+1 = 주차 번호.
    const WEEK_DATES = [
      '2026-05-30', // 1주차
      '2026-06-06', // 2주차
      '2026-06-13', // 3주차
      '2026-06-20', // 4주차
      '2026-06-27', // 5주차
      '2026-07-04', // 6주차
      '2026-07-11', // 7주차
      '2026-07-18', // 8주차
      '2026-07-25', // 9주차
      '2026-08-08', // 10주차 (8/1 휴강 스킵)
      '2026-08-15', // 11주차
    ];
    const TOTAL_WEEKS = WEEK_DATES.length;
    // 주차 → 시트 ID (매주 추가). 없으면 null → 잠금.
    const SHEETS = {
      1: '1n4LrQf1Oxui93CdYraN554sN0CUf-miJ8hPHk8ph9Y4',
    };
    // ─────────────────────────────────────────────────

    const $ = (id) => document.getElementById(id);
    const STEPS = ['stepName', 'stepPin', 'stepWeeks'];
    let selectedName = null;

    function showStep(id) {
      STEPS.forEach((s) => $(s).classList.toggle('hidden', s !== id));
    }

    // 현재 주차: 날짜가 지난 마지막 주차. 학기 시작 전이면 1주차로 열어둠.
    function getCurrentWeek() {
      const now = new Date();
      let cur = 1;
      for (let i = 0; i < WEEK_DATES.length; i++) {
        if (now >= new Date(WEEK_DATES[i] + 'T00:00:00')) cur = i + 1;
      }
      return cur;
    }
    function weekDate(w) {
      const d = new Date(WEEK_DATES[w - 1] + 'T00:00:00');
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    /* ── STEP 1: 이름 ── */
    STUDENTS.forEach((name) => {
      const b = document.createElement('button');
      b.className = 'name-chip';
      b.textContent = name;
      b.onclick = () => goToPin(name);
      $('nameList').appendChild(b);
    });

    function goToPin(name) {
      selectedName = name;
      $('pinName').textContent = name;
      $('pinBanner').innerHTML = '';
      buildPinBoxes();
      showStep('stepPin');
      setTimeout(() => $('pin0').focus(), 80);
    }
    $('pinBack').onclick = () => showStep('stepName');

    /* ── STEP 2: PIN ── */
    function buildPinBoxes() {
      const row = $('pinRow');
      row.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const inp = document.createElement('input');
        inp.className = 'pin-box';
        inp.id = 'pin' + i;
        inp.inputMode = 'numeric';
        inp.maxLength = 1;
        inp.autocomplete = 'off';
        inp.oninput = () => {
          inp.value = inp.value.replace(/\D/g, '');
          if (inp.value && i < 3) $('pin' + (i + 1)).focus();
          if (i === 3 && inp.value) trySubmitPin();
        };
        inp.onkeydown = (e) => {
          if (e.key === 'Backspace' && !inp.value && i > 0) $('pin' + (i - 1)).focus();
        };
        row.appendChild(inp);
      }
    }
    function readPin() { return [0, 1, 2, 3].map((i) => $('pin' + i).value).join(''); }

    // v1: 프런트 게이트(전부 1234). 추후 백엔드 `명단` 탭 검증으로 교체하기 쉽게 분리.
    async function verifyPin(name, pin) { return pin === '1234'; }

    async function trySubmitPin() {
      const pin = readPin();
      if (pin.length < 4) return;
      const ok = await verifyPin(selectedName, pin);
      if (!ok) {
        $('pinRow').querySelectorAll('.pin-box').forEach((b) => { b.classList.add('shake'); b.value = ''; });
        setTimeout(() => $('pinRow').querySelectorAll('.pin-box').forEach((b) => b.classList.remove('shake')), 300);
        $('pinBanner').innerHTML = '<div class="banner error">비밀번호가 맞지 않아요. 다시 입력해주세요.</div>';
        $('pin0').focus();
        return;
      }
      sessionStorage.setItem('mgt:name', selectedName);
      enterWeeks();
    }

    /* ── STEP 3: 주차 그리드 ── */
    function enterWeeks() {
      const cur = getCurrentWeek();
      $('nowInfo').innerHTML =
        `${selectedName} 님, 현재 <strong>${cur}주차</strong> (${weekDate(cur)})가 열려 있어요.`;
      const grid = $('weekGrid');
      grid.innerHTML = '';
      for (let w = 1; w <= TOTAL_WEEKS; w++) {
        const open = (w === cur) && !!SHEETS[w];
        if (open) {
          const a = document.createElement('a');
          a.className = 'week-cell current';
          a.href = `answer.html?sheetId=${SHEETS[w]}&week=${w}`;
          a.innerHTML = `<span class="wk-num">${w}주차</span><span class="wk-date">${weekDate(w)}</span>`;
          grid.appendChild(a);
        } else {
          const d = document.createElement('div');
          d.className = 'week-cell locked';
          d.innerHTML = `<span class="wk-num">${w}주차</span><span class="wk-date">${weekDate(w)}</span>`;
          grid.appendChild(d);
        }
      }
      showStep('stepWeeks');
    }

    $('logout').onclick = () => {
      sessionStorage.removeItem('mgt:name');
      selectedName = null;
      showStep('stepName');
    };

    /* ── 진입: 같은 세션에서 이미 로그인했으면 주차로 ── */
    const saved = sessionStorage.getItem('mgt:name');
    if (saved && STUDENTS.includes(saved)) {
      selectedName = saved;
      enterWeeks();
    }
  </script>
</body>
</html>
