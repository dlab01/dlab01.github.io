<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGT 답안 제출</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Montserrat:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN.md (Geniestudio) 토큰 ── */
    :root {
      --obsidian:#0a0d12; --silver-pine:#535862; --ash-gray:#93979f;
      --canvas-white:#ffffff; --arctic-mist:#fafdff; --sky-wash:#ebf5ff;
      --ghostly-blue:#cce7ff; --midnight-ink:#181d27;
      --luminous-blue:#0099ff; --electric-blue:#0069e0;
      --mint-glaze:#d3f6e3; --zesty-orange:#f26110;
      --font-body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
      --font-display:'Montserrat',ui-sans-serif,system-ui,sans-serif;
      --shadow-lg:rgba(4,69,144,0.08) 0px 14px 20px 4px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:var(--font-body); background:var(--sky-wash);
      color:var(--obsidian); min-height:100vh; padding:24px 16px 48px;
      letter-spacing:-0.01em; -webkit-font-smoothing:antialiased;
    }
    .wrap { max-width:640px; margin:0 auto; }
    .logo { display:block; margin:0 auto 8px; width:88px; mix-blend-mode:multiply; }
    .subtitle { text-align:center; color:var(--silver-pine); font-size:14px; margin-bottom:24px; }
    .subtitle strong { color:var(--electric-blue); }

    .card {
      background:var(--arctic-mist); border-radius:32px; padding:32px 24px;
      box-shadow:var(--shadow-lg);
    }
    h1 { font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:-0.02em; margin-bottom:6px; }
    h2 { font-family:var(--font-display); font-weight:600; font-size:20px; letter-spacing:-0.02em; margin-bottom:14px; }
    .hint { color:var(--silver-pine); font-size:14px; margin-bottom:20px; line-height:1.5; }

    /* 이름 선택 칩 */
    .names { display:flex; flex-wrap:wrap; gap:10px; }
    .name-chip {
      font-family:var(--font-body); font-weight:600; font-size:15px;
      padding:12px 22px; border-radius:90px; border:1.5px solid var(--ash-gray);
      background:var(--canvas-white); color:var(--obsidian); cursor:pointer;
      transition:border-color .15s, background .15s, color .15s, transform .1s;
    }
    .name-chip:hover { border-color:var(--electric-blue); }
    .name-chip:active { transform:scale(.97); }
    .name-chip.selected { background:var(--midnight-ink); color:var(--canvas-white); border-color:var(--midnight-ink); }

    /* PIN */
    .pin-row { display:flex; gap:12px; justify-content:center; margin:8px 0 4px; }
    .pin-box {
      width:56px; height:64px; text-align:center; font-family:var(--font-display);
      font-size:26px; font-weight:600; color:var(--obsidian); border-radius:16px;
      border:1.5px solid #e4e7ec; background:var(--canvas-white); -webkit-text-security:disc; text-security:disc;
    }
    .pin-box:focus { outline:none; border-color:var(--luminous-blue); }
    .pin-box.shake { animation:shake .3s; border-color:var(--zesty-orange); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* 진행바 + 라벨 */
    .progress-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .progress-track { flex:1; height:8px; border-radius:90px; background:var(--ghostly-blue); overflow:hidden; }
    .progress-fill { height:100%; width:0; border-radius:90px; background:var(--electric-blue); transition:width .35s ease; }
    .progress-label { font-size:13px; font-weight:600; color:var(--silver-pine); white-space:nowrap; }

    /* 문항 네비게이터 */
    .nav-dots { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
    .nav-dot {
      width:36px; height:36px; border-radius:12px; border:1.5px solid #e4e7ec;
      background:var(--canvas-white); color:var(--silver-pine); font-family:var(--font-body);
      font-weight:600; font-size:14px; cursor:pointer; transition:all .12s;
    }
    .nav-dot:hover { border-color:var(--electric-blue); }
    .nav-dot.answered { background:var(--mint-glaze); border-color:transparent; color:#0c6b3f; }
    .nav-dot.current { background:var(--midnight-ink); border-color:var(--midnight-ink); color:var(--canvas-white); }
    .nav-dot.image { background:var(--sky-wash); border-style:dashed; border-color:#c5cef8; color:var(--ash-gray); }

    /* 문항 카드 */
    .q-card { animation:qIn .28s ease; }
    @keyframes qIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .q-num { display:inline-block; color:var(--electric-blue); font-weight:600; font-size:13px; margin-bottom:8px; }
    .q-text { font-weight:600; font-size:18px; line-height:1.5; margin-bottom:18px; white-space:pre-wrap; }
    textarea {
      width:100%; min-height:140px; resize:vertical; font-family:var(--font-body);
      font-size:15px; color:var(--obsidian); padding:16px; border-radius:16px;
      border:1.5px solid #e4e7ec; background:var(--canvas-white); letter-spacing:-0.01em; line-height:1.55;
    }
    textarea:focus { outline:none; border-color:var(--luminous-blue); }
    textarea::placeholder { color:var(--ash-gray); }
    .q-disabled {
      padding:16px; border-radius:16px; background:var(--sky-wash);
      color:var(--silver-pine); font-size:14px; border:1.5px dashed #c5cef8; line-height:1.5;
    }

    /* 하단 네비 버튼 */
    .step-nav { display:flex; gap:12px; margin-top:22px; }
    .btn {
      flex:1; font-family:var(--font-body); font-weight:600; font-size:16px;
      padding:15px; border:none; border-radius:32px; cursor:pointer;
      background:var(--midnight-ink); color:var(--canvas-white); transition:opacity .15s, transform .1s;
    }
    .btn:hover { transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn.ghost { background:var(--canvas-white); color:var(--obsidian); border:1.5px solid #e4e7ec; }
    .btn.ghost:hover { border-color:var(--electric-blue); }

    /* 검토 화면 */
    .review-list { display:flex; flex-direction:column; gap:10px; margin-bottom:8px; }
    .review-row {
      text-align:left; width:100%; background:var(--canvas-white); border:1.5px solid #e4e7ec;
      border-radius:16px; padding:14px 16px; cursor:pointer; transition:border-color .12s;
    }
    .review-row:hover { border-color:var(--electric-blue); }
    .review-q { font-size:13px; color:var(--silver-pine); margin-bottom:6px; line-height:1.4; }
    .review-q b { color:var(--electric-blue); }
    .review-a { font-size:15px; font-weight:600; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
    .review-a.empty { color:var(--zesty-orange); font-weight:500; }
    .review-a.muted { color:var(--ash-gray); font-weight:500; }

    /* 상태 */
    .center { text-align:center; padding:32px 0; color:var(--silver-pine); }
    .spinner {
      width:32px; height:32px; margin:0 auto 16px; border:3px solid #d7e6f5;
      border-top-color:var(--electric-blue); border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .banner { padding:14px 18px; border-radius:16px; font-size:14px; margin-bottom:16px; line-height:1.5; }
    .banner.error { background:#fff2eb; color:var(--zesty-orange); }
    .success-icon { font-size:48px; margin-bottom:12px; }
    .hidden { display:none; }
    .link-btn {
      background:none; border:none; color:var(--luminous-blue); font-family:var(--font-body);
      font-weight:600; font-size:15px; cursor:pointer; text-decoration:underline; margin-top:16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="dlab.png" alt="D.LAB" class="logo" />
    <p class="subtitle"><strong id="weekLabel">MGT</strong> 답안 제출</p>

    <!-- STEP 1: 이름 선택 -->
    <section class="card" id="stepName">
      <h1>이름을 선택하세요</h1>
      <p class="hint">본인 이름을 누르면 다음 단계로 넘어갑니다.</p>
      <div class="names" id="nameList"></div>
    </section>

    <!-- STEP 2: PIN -->
    <section class="card hidden" id="stepPin">
      <h1>비밀번호 입력</h1>
      <p class="hint"><strong id="pinName"></strong> 님, 4자리 비밀번호를 입력하세요.</p>
      <div class="pin-row" id="pinRow"></div>
      <div id="pinBanner"></div>
      <div class="step-nav">
        <button class="btn ghost" id="pinBack">← 이름 다시</button>
      </div>
    </section>

    <!-- STEP 3: 로딩/에러 -->
    <section class="card hidden" id="stepLoad">
      <div id="loadBanner"></div>
      <div class="center" id="loadSpinner">
        <div class="spinner"></div>문제를 불러오는 중...
      </div>
    </section>

    <!-- STEP 4: 한 문제 한 화면 -->
    <section class="hidden" id="stepQuestion">
      <div class="progress-head">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-label" id="progressLabel">1 / 1</span>
      </div>
      <div class="nav-dots" id="navDots"></div>
      <div class="card">
        <div class="q-card" id="qCard"></div>
        <div class="step-nav">
          <button class="btn ghost" id="prevBtn">← 이전</button>
          <button class="btn" id="nextBtn">다음 →</button>
        </div>
      </div>
    </section>

    <!-- STEP 5: 검토 & 제출 -->
    <section class="card hidden" id="stepReview">
      <h2>제출 전 마지막 확인</h2>
      <p class="hint">답을 누르면 해당 문항으로 돌아가 수정할 수 있어요.</p>
      <div id="reviewBanner"></div>
      <div class="review-list" id="reviewList"></div>
      <div class="step-nav">
        <button class="btn ghost" id="reviewBack">← 문항으로</button>
        <button class="btn" id="submitBtn">제출하기</button>
      </div>
    </section>

    <!-- STEP 6: 완료 -->
    <section class="card hidden" id="stepDone">
      <div class="center">
        <div class="success-icon">✅</div>
        <h2>제출 완료!</h2>
        <p class="hint" id="doneMsg"></p>
        <button class="link-btn" onclick="location.href='index.html'">← 주차 목록으로</button>
      </div>
    </section>
  </div>

  <script>
    // ── 설정 ──────────────────────────────────────────────
    // 1) Apps Script 배포 후 발급된 /exec URL.
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzQIPWsAKgGoxGyE4oiN6BeGZcbRbPBA1YrqU2kR2gHfG9Da6gIqNGeU1XBaIPQ4vjy2Q/exec';
    // 2) 학생 명단 (추후 DB/시트로 교체)
    const STUDENTS = ['박노아', '김세임', '정재윤', '한아라'];
    // 3) 대상 주차 시트 ID. ?sheetId= 로 덮어쓸 수 있음. 없으면 백엔드 기본값 사용.
    const PARAMS = new URLSearchParams(location.search);
    const SHEET_ID = PARAMS.get('sheetId') || '';
    const WEEK = PARAMS.get('week') || '';
    // ──────────────────────────────────────────────────────

    const $ = (id) => document.getElementById(id);
    const STEPS = ['stepName', 'stepPin', 'stepLoad', 'stepQuestion', 'stepReview', 'stepDone'];

    let selectedName = null;
    let questions = [];   // [{col, text, type, disabled}]
    let answers = {};     // { "<col>": "답" }
    let current = 0;      // 현재 문항 인덱스

    function showStep(id) {
      STEPS.forEach((s) => $(s).classList.toggle('hidden', s !== id));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── STEP 1: 이름 ── */
    STUDENTS.forEach((name) => {
      const b = document.createElement('button');
      b.className = 'name-chip';
      b.textContent = name;
      b.onclick = () => goToPin(name);
      $('nameList').appendChild(b);
    });

    function goToPin(name) {
      selectedName = name;
      $('pinName').textContent = name;
      $('pinBanner').innerHTML = '';
      buildPinBoxes();
      showStep('stepPin');
      setTimeout(() => $('pin0').focus(), 80);
    }
    $('pinBack').onclick = () => showStep('stepName');

    /* ── STEP 2: PIN ── */
    function buildPinBoxes() {
      const row = $('pinRow');
      row.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const inp = document.createElement('input');
        inp.className = 'pin-box';
        inp.id = 'pin' + i;
        inp.inputMode = 'numeric';
        inp.maxLength = 1;
        inp.autocomplete = 'off';
        inp.oninput = () => {
          inp.value = inp.value.replace(/\D/g, '');
          if (inp.value && i < 3) $('pin' + (i + 1)).focus();
          if (i === 3 && inp.value) trySubmitPin();
        };
        inp.onkeydown = (e) => {
          if (e.key === 'Backspace' && !inp.value && i > 0) $('pin' + (i - 1)).focus();
        };
        row.appendChild(inp);
      }
    }

    function readPin() {
      return [0, 1, 2, 3].map((i) => $('pin' + i).value).join('');
    }

    // v1: 프런트 게이트(전부 1234). 추후 백엔드 `명단` 탭 검증으로 교체하기 쉽게 분리.
    async function verifyPin(name, pin) {
      return pin === '1234';
    }

    async function trySubmitPin() {
      const pin = readPin();
      if (pin.length < 4) return;
      const ok = await verifyPin(selectedName, pin);
      if (!ok) {
        $('pinRow').querySelectorAll('.pin-box').forEach((b) => {
          b.classList.add('shake'); b.value = '';
        });
        setTimeout(() => $('pinRow').querySelectorAll('.pin-box').forEach((b) => b.classList.remove('shake')), 300);
        $('pinBanner').innerHTML = '<div class="banner error">비밀번호가 맞지 않아요. 다시 입력해주세요.</div>';
        $('pin0').focus();
        return;
      }
      $('pinBanner').innerHTML = '';
      loadQuestions();
    }

    /* ── STEP 3: 질문 불러오기 (GET) ── */
    function storeKey() { return `mgt:answers:${SHEET_ID || 'default'}:${selectedName}`; }

    function restoreAnswers() {
      answers = {};
      try {
        const saved = JSON.parse(localStorage.getItem(storeKey()) || '{}');
        if (saved && typeof saved === 'object') answers = saved;
      } catch (_) { answers = {}; }
    }
    function saveAnswers() {
      try { localStorage.setItem(storeKey(), JSON.stringify(answers)); } catch (_) {}
    }

    async function loadQuestions() {
      $('loadBanner').innerHTML = '';
      $('loadSpinner').classList.remove('hidden');
      showStep('stepLoad');
      try {
        const url = `${WEBAPP_URL}?action=questions${SHEET_ID ? '&sheetId=' + SHEET_ID : ''}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.error) throw new Error(data.message || data.error);
        questions = data.questions || [];
        if (!questions.length) {
          $('loadSpinner').classList.add('hidden');
          $('loadBanner').innerHTML = '<div class="banner error">아직 등록된 문제가 없어요.</div>';
          return;
        }
        restoreAnswers();
        current = 0;
        buildNavDots();
        renderQuestion();
        showStep('stepQuestion');
      } catch (err) {
        $('loadSpinner').classList.add('hidden');
        $('loadBanner').innerHTML =
          '<div class="banner error">문제를 불러오지 못했어요. 인터넷을 확인하고 다시 시도해주세요.</div>' +
          '<button class="link-btn" id="retryBtn">다시 시도</button>';
        $('retryBtn').onclick = loadQuestions;
        console.error(err);
      }
    }

    /* ── STEP 4: 한 문제 한 화면 ── */
    function isAnswered(q) { return !q.disabled && !!(answers[q.col] && answers[q.col].trim()); }

    function buildNavDots() {
      const wrap = $('navDots');
      wrap.innerHTML = '';
      questions.forEach((q, i) => {
        const d = document.createElement('button');
        d.className = 'nav-dot';
        d.textContent = i + 1;
        d.onclick = () => goTo(i);
        wrap.appendChild(d);
      });
    }

    function updateNavDots() {
      $('navDots').querySelectorAll('.nav-dot').forEach((d, i) => {
        const q = questions[i];
        d.classList.toggle('image', !!q.disabled);
        d.classList.toggle('answered', isAnswered(q));
        d.classList.toggle('current', i === current);
      });
    }

    function renderQuestion() {
      const q = questions[current];
      const total = questions.length;
      $('progressFill').style.width = ((current + 1) / total * 100) + '%';
      $('progressLabel').textContent = `${current + 1} / ${total}`;
      updateNavDots();

      const card = $('qCard');
      card.innerHTML = '';
      // 애니메이션 재시작
      card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';

      const num = document.createElement('div');
      num.className = 'q-num';
      num.textContent = `Q${current + 1}`;
      card.appendChild(num);

      const text = document.createElement('div');
      text.className = 'q-text';
      text.textContent = q.text;
      card.appendChild(text);

      if (q.disabled) {
        const note = document.createElement('div');
        note.className = 'q-disabled';
        note.textContent = '이 문항은 교실에서 직접 제출해요 (이미지).';
        card.appendChild(note);
      } else {
        const ta = document.createElement('textarea');
        ta.placeholder = '답을 입력하세요';
        ta.value = answers[q.col] || '';
        ta.oninput = () => {
          answers[q.col] = ta.value;
          saveAnswers();
          updateNavDots();
        };
        card.appendChild(ta);
        setTimeout(() => ta.focus(), 60);
      }

      $('prevBtn').style.visibility = current === 0 ? 'hidden' : 'visible';
      $('nextBtn').textContent = current === total - 1 ? '검토하기 →' : '다음 →';
    }

    function goTo(i) {
      if (i < 0 || i >= questions.length) return;
      current = i;
      renderQuestion();
    }
    $('prevBtn').onclick = () => goTo(current - 1);
    $('nextBtn').onclick = () => {
      if (current === questions.length - 1) openReview();
      else goTo(current + 1);
    };

    // 키보드 ←/→ (입력 중일 때는 커서 이동 방해 안 하도록 제외)
    document.addEventListener('keydown', (e) => {
      if ($('stepQuestion').classList.contains('hidden')) return;
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') $('nextBtn').click();
    });

    // 스와이프 (textarea 위에서 시작한 제스처는 무시)
    let touchX = null;
    $('stepQuestion').addEventListener('touchstart', (e) => {
      touchX = e.target.tagName === 'TEXTAREA' ? null : e.touches[0].clientX;
    }, { passive: true });
    $('stepQuestion').addEventListener('touchend', (e) => {
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 60) (dx < 0 ? $('nextBtn') : $('prevBtn')).click();
      touchX = null;
    }, { passive: true });

    /* ── STEP 5: 검토 ── */
    function openReview() {
      const list = $('reviewList');
      list.innerHTML = '';
      $('reviewBanner').innerHTML = '';
      questions.forEach((q, i) => {
        const row = document.createElement('button');
        row.className = 'review-row';
        row.onclick = () => { goTo(i); showStep('stepQuestion'); };
        const ans = (answers[q.col] || '').trim();
        let aClass = 'review-a', aText = ans;
        if (q.disabled) { aClass += ' muted'; aText = '교실에서 직접 제출'; }
        else if (!ans) { aClass += ' empty'; aText = '미답변'; }
        row.innerHTML =
          `<div class="review-q"><b>Q${i + 1}</b> · ${escapeHtml(q.text)}</div>` +
          `<div class="${aClass}">${escapeHtml(aText)}</div>`;
        list.appendChild(row);
      });
      showStep('stepReview');
    }
    $('reviewBack').onclick = () => showStep('stepQuestion');

    /* ── 제출 (POST, text/plain → CORS preflight 회피) ── */
    $('submitBtn').onclick = async () => {
      const btn = $('submitBtn');
      btn.disabled = true; btn.textContent = '제출 중...';
      $('reviewBanner').innerHTML = '';

      const payload = {};
      questions.forEach((q) => {
        if (!q.disabled && (answers[q.col] || '').trim()) payload[q.col] = answers[q.col];
      });

      try {
        const res = await fetch(WEBAPP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'submit', sheetId: SHEET_ID || undefined, name: selectedName, answers: payload }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.message || data.error || 'FAIL');
        try { localStorage.removeItem(storeKey()); } catch (_) {}
        const at = data.savedAt ? new Date(data.savedAt).toLocaleString('ko-KR') : '';
        $('doneMsg').textContent = `${selectedName} 님의 답안이 저장됐어요.` + (at ? ` (${at})` : '');
        showStep('stepDone');
      } catch (err) {
        btn.disabled = false; btn.textContent = '제출하기';
        $('reviewBanner').innerHTML = '<div class="banner error">제출에 실패했어요. 잠시 후 다시 시도해주세요.</div>';
        console.error(err);
      }
    };

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    /* ── 진입: index에서 로그인했으면 이름 인계 → 이름/PIN 건너뛰고 바로 문항 ── */
    if (WEEK) $('weekLabel').textContent = WEEK + '주차';
    const ssName = sessionStorage.getItem('mgt:name');
    if (ssName && STUDENTS.includes(ssName)) {
      selectedName = ssName;
      loadQuestions();
    } else {
      showStep('stepName'); // 직접 접근 폴백: 이름+PIN 게이트
    }
  </script>
</body>
</html>
