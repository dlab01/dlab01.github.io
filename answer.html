<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGT 답안 제출</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Montserrat:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN.md (Geniestudio) 토큰 ── */
    :root {
      --obsidian:#0a0d12; --silver-pine:#535862; --ash-gray:#93979f;
      --canvas-white:#ffffff; --arctic-mist:#fafdff; --sky-wash:#ebf5ff;
      --midnight-ink:#181d27; --luminous-blue:#0099ff; --electric-blue:#0069e0;
      --mint-glaze:#d3f6e3; --zesty-orange:#f26110;
      --font-body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
      --font-display:'Montserrat',ui-sans-serif,system-ui,sans-serif;
      --shadow-lg:rgba(4,69,144,0.08) 0px 14px 20px 4px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:var(--font-body); background:var(--sky-wash);
      color:var(--obsidian); min-height:100vh; padding:32px 16px 80px;
      letter-spacing:-0.01em; -webkit-font-smoothing:antialiased;
    }
    .wrap { max-width:640px; margin:0 auto; }
    .logo { display:block; margin:0 auto 8px; width:96px; mix-blend-mode:multiply; }
    .subtitle { text-align:center; color:var(--silver-pine); font-size:14px; margin-bottom:28px; }
    .subtitle strong { color:var(--electric-blue); }

    .card {
      background:var(--arctic-mist); border-radius:32px; padding:32px 24px;
      box-shadow:var(--shadow-lg); margin-bottom:20px;
    }
    h1 { font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:-0.02em; margin-bottom:6px; }
    h2 { font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:-0.02em; margin-bottom:16px; }
    .hint { color:var(--silver-pine); font-size:14px; margin-bottom:20px; line-height:1.5; }

    /* 이름 선택 칩 */
    .names { display:flex; flex-wrap:wrap; gap:10px; }
    .name-chip {
      font-family:var(--font-body); font-weight:600; font-size:15px;
      padding:12px 22px; border-radius:90px; border:1.5px solid var(--ash-gray);
      background:var(--canvas-white); color:var(--obsidian); cursor:pointer;
      transition:border-color .15s, background .15s, transform .1s;
    }
    .name-chip:hover { border-color:var(--electric-blue); }
    .name-chip.selected { background:var(--midnight-ink); color:var(--canvas-white); border-color:var(--midnight-ink); }

    /* 질문 */
    .q { margin-bottom:24px; }
    .q-label { display:block; font-weight:600; font-size:15px; margin-bottom:10px; line-height:1.5; }
    .q-num { color:var(--electric-blue); font-weight:600; margin-right:6px; }
    textarea {
      width:100%; min-height:96px; resize:vertical; font-family:var(--font-body);
      font-size:15px; color:var(--obsidian); padding:14px 16px; border-radius:16px;
      border:1.5px solid #e4e7ec; background:var(--canvas-white); letter-spacing:-0.01em; line-height:1.5;
    }
    textarea:focus { outline:none; border-color:var(--luminous-blue); }
    textarea::placeholder { color:var(--ash-gray); }
    .q.image .q-disabled {
      padding:14px 16px; border-radius:16px; background:var(--sky-wash);
      color:var(--silver-pine); font-size:14px; border:1.5px dashed #c5cef8;
    }

    /* 버튼 */
    .btn {
      display:block; width:100%; font-family:var(--font-body); font-weight:600; font-size:16px;
      padding:16px; border:none; border-radius:32px; cursor:pointer;
      background:var(--midnight-ink); color:var(--canvas-white); transition:opacity .15s, transform .1s;
    }
    .btn:hover { transform:translateY(-1px); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* 상태 */
    .center { text-align:center; padding:40px 0; color:var(--silver-pine); }
    .spinner {
      width:32px; height:32px; margin:0 auto 16px; border:3px solid #d7e6f5;
      border-top-color:var(--electric-blue); border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .banner {
      padding:14px 18px; border-radius:16px; font-size:14px; margin-bottom:16px; line-height:1.5;
    }
    .banner.error { background:#fff2eb; color:var(--zesty-orange); }
    .success-icon { font-size:48px; margin-bottom:12px; }
    .hidden { display:none; }
    .link-btn {
      background:none; border:none; color:var(--luminous-blue); font-family:var(--font-body);
      font-weight:600; font-size:15px; cursor:pointer; text-decoration:underline; margin-top:16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="dlab.png" alt="D.LAB" class="logo" />
    <p class="subtitle" id="subtitle"><strong id="weekLabel">MGT</strong> 답안 제출</p>

    <!-- STEP 1: 이름 선택 -->
    <section class="card" id="stepName">
      <h1>이름을 선택하세요</h1>
      <p class="hint">본인 이름을 누르면 이번 주 문제가 나타납니다.</p>
      <div class="names" id="nameList"></div>
    </section>

    <!-- STEP 2: 질문 폼 -->
    <section class="card hidden" id="stepForm">
      <h2 id="formTitle">문제</h2>
      <div id="banner"></div>
      <div id="loading" class="center hidden">
        <div class="spinner"></div>문제를 불러오는 중...
      </div>
      <form id="answerForm"></form>
    </section>
  </div>

  <script>
    // ── 설정 ──────────────────────────────────────────────
    // 1) Apps Script 배포 후 발급된 /exec URL 을 붙여넣으세요.
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzQIPWsAKgGoxGyE4oiN6BeGZcbRbPBA1YrqU2kR2gHfG9Da6gIqNGeU1XBaIPQ4vjy2Q/exec';
    // 2) 학생 명단 (추후 DB/시트로 교체)
    const STUDENTS = ['박노아', '김세임', '정재윤', '한아라'];
    // 3) 대상 주차 시트 ID. ?sheetId= 로 덮어쓸 수 있음. 없으면 백엔드 기본값 사용.
    const SHEET_ID = new URLSearchParams(location.search).get('sheetId') || '';
    // ──────────────────────────────────────────────────────

    const $ = (id) => document.getElementById(id);
    let selectedName = null;
    let questions = [];

    // STEP 1: 이름 칩 렌더
    STUDENTS.forEach((name) => {
      const b = document.createElement('button');
      b.className = 'name-chip';
      b.textContent = name;
      b.onclick = () => selectName(name, b);
      $('nameList').appendChild(b);
    });

    function selectName(name, el) {
      selectedName = name;
      document.querySelectorAll('.name-chip').forEach((c) => c.classList.remove('selected'));
      el.classList.add('selected');
      $('formTitle').textContent = name + ' 님의 답안';
      $('stepForm').classList.remove('hidden');
      $('stepForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
      loadQuestions();
    }

    function showBanner(msg, type) {
      $('banner').innerHTML = msg ? `<div class="banner ${type}">${msg}</div>` : '';
    }

    // 질문 불러오기 (GET)
    async function loadQuestions() {
      showBanner('');
      $('answerForm').innerHTML = '';
      $('loading').classList.remove('hidden');
      try {
        const url = `${WEBAPP_URL}?action=questions${SHEET_ID ? '&sheetId=' + SHEET_ID : ''}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.error) throw new Error(data.message || data.error);
        questions = data.questions || [];
        renderForm();
      } catch (err) {
        $('loading').classList.add('hidden');
        showBanner('문제를 불러오지 못했어요. 인터넷을 확인하고 다시 시도해주세요.', 'error');
        const retry = document.createElement('button');
        retry.className = 'link-btn';
        retry.textContent = '다시 시도';
        retry.onclick = loadQuestions;
        $('answerForm').appendChild(retry);
        console.error(err);
      }
    }

    function renderForm() {
      $('loading').classList.add('hidden');
      const form = $('answerForm');
      form.innerHTML = '';

      if (!questions.length) {
        showBanner('아직 등록된 문제가 없어요.', 'error');
        return;
      }

      questions.forEach((q, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'q' + (q.type === 'image' ? ' image' : '');
        const label = document.createElement('label');
        label.className = 'q-label';
        label.innerHTML = `<span class="q-num">Q${i + 1}</span>${escapeHtml(q.text)}`;
        wrap.appendChild(label);

        if (q.disabled) {
          const note = document.createElement('div');
          note.className = 'q-disabled';
          note.textContent = '이 문항은 교실에서 직접 제출해요 (이미지).';
          wrap.appendChild(note);
        } else {
          const ta = document.createElement('textarea');
          ta.placeholder = '답을 입력하세요';
          ta.dataset.col = q.col;
          wrap.appendChild(ta);
        }
        form.appendChild(wrap);
      });

      const submit = document.createElement('button');
      submit.type = 'submit';
      submit.className = 'btn';
      submit.textContent = '제출하기';
      form.appendChild(submit);
      form.onsubmit = handleSubmit;
    }

    // 제출 (POST, text/plain → CORS preflight 회피)
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = '제출 중...';
      showBanner('');

      const answers = {};
      document.querySelectorAll('#answerForm textarea').forEach((ta) => {
        if (ta.value.trim()) answers[ta.dataset.col] = ta.value;
      });

      try {
        const res = await fetch(WEBAPP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'submit', sheetId: SHEET_ID || undefined, name: selectedName, answers }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.message || data.error || 'FAIL');
        showSuccess();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '제출하기';
        showBanner('제출에 실패했어요. 잠시 후 다시 시도해주세요.', 'error');
        console.error(err);
      }
    }

    function showSuccess() {
      $('stepName').classList.add('hidden');
      $('stepForm').innerHTML =
        `<div class="center">
           <div class="success-icon">✅</div>
           <h2>제출 완료!</h2>
           <p class="hint">${escapeHtml(selectedName)} 님의 답안이 저장됐어요.</p>
           <button class="link-btn" onclick="location.reload()">다른 이름으로 제출</button>
         </div>`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
